# Human Checkpoints — 사람이 개입해야 하는 지점
# OpenClaw는 이 노드에서 자동 실행을 중단하고 사람의 응답을 기다린다.

version: "5.1"
schema: "human-checkpoints"

# execution types:
#   ai_autonomous: OpenClaw + Claude가 완전 자동 실행
#   ai_with_human_approval: AI가 실행하되 사람이 최종 승인
#   ai_draft_human_execute: AI가 문서 작성, 사람이 외부에서 실행
#   human_required: 사람이 직접 수행 (AI는 가이드만)
#   ai_with_human_data: AI가 실행하되 사람이 데이터를 제공

# ============================================================
# 전체 에이전트 실행 타입 맵
# ============================================================

execution_map:
  # --- CBO (전부 자동) ---
  pain_point_hunter: "ai_autonomous"
  competitor_analyst: "ai_autonomous"
  bm_designer: "ai_autonomous"
  business_planner: "ai_autonomous"
  gtm_strategist: "ai_autonomous"
  
  # --- Gates (승인 필요한 것만) ---
  gate_1_product_brief: "ai_autonomous"
  gate_3_design_upgrade_brief: "ai_with_human_approval"
  gate_4_design_delivery: "ai_with_human_approval"
  gate_5_launch_brief: "ai_autonomous"
  gate_6_growth_insights: "ai_with_human_approval"
  
  # --- CTO (대부분 자동) ---
  prd_architect: "ai_autonomous"
  scope_guard: "ai_autonomous"
  architect: "ai_autonomous"
  frontend_engineer: "ai_autonomous"
  backend_engineer: "ai_autonomous"
  code_reviewer: "ai_autonomous"
  devops: "ai_autonomous"
  
  # --- CDO (대부분 자동) ---
  ui_designer: "ai_autonomous"
  visual_director: "ai_autonomous"
  image_generator: "ai_autonomous"
  screenshot_designer: "ai_autonomous"
  aso_optimizer: "ai_autonomous"
  design_to_code_bridge: "ai_autonomous"
  
  # --- Human checkpoints ---
  user_validation_gate: "human_required"
  
  # --- CGO (혼합) ---
  acquisition_strategist: "ai_autonomous"
  copy_strategist: "ai_autonomous"
  ads_operator: "ai_draft_human_execute"
  content_creator: "ai_autonomous"
  onboarding_designer: "ai_autonomous"
  retention_manager: "ai_autonomous"
  revenue_optimizer: "ai_autonomous"
  growth_analyst: "ai_with_human_data"
  
  # --- CEO ---
  ceo_decision: "ai_with_human_approval"

# ============================================================
# 상세 Human Checkpoint 정의
# ============================================================

checkpoints:

  # --- CHECKPOINT 1: Design Upgrade Brief 확인 ---
  gate_3_design_upgrade_brief:
    when: "CTO 개발 완료 후, CDO 시작 전"
    why: "브랜드 키워드, 디자인 방향은 사람의 판단이 필요"
    
    ai_prepares:
      - "Design Upgrade Brief 초안 자동 생성"
      - "프로토타입 URL/스크린샷 포함"
    
    human_reviews:
      prompt: |
        디자인 업그레이드 브리프를 확인해주세요:
        - 브랜드 키워드 (3-5개)가 맞나요?
        - 요청 범위가 맞나요? (전체 리디자인 / 핵심 화면만 / 아이콘만)
        - 참고할 디자인 레퍼런스가 있으면 추가해주세요.
      
      options:
        approve: "이대로 진행"
        edit: "수정 후 진행 (수정 사항 입력)"
        skip_design: "디자인 스킵 — 프로토타입 그대로 런칭"
    
    timeout: "24시간"
    on_timeout: "approve (기본값으로 진행)"

  # --- CHECKPOINT 2: Design Delivery 확인 ---
  gate_4_design_delivery:
    when: "CDO 완료 후, 개발 적용 전"
    why: "디자인 결과물의 시각적 품질은 사람이 판단해야 함"
    
    ai_prepares:
      - "디자인 토큰 + 컴포넌트 목록 생성"
      - "에셋 파일 생성"
    
    human_reviews:
      prompt: |
        디자인 결과물을 확인해주세요:
        - 색상 팔레트가 브랜드에 맞나요?
        - 아이콘이 마음에 드나요?
        - 스크린샷이 앱스토어에 올릴 수준인가요?
      
      options:
        approve: "승인"
        request_revision: "수정 요청 (구체적 피드백 입력)"
    
    timeout: "24시간"
    on_timeout: "approve"

  # --- CHECKPOINT 3: User Validation (사람 직접 수행) ---
  user_validation_gate:
    when: "디자인 완료 후, 그로스 시작 전"
    why: "실제 사용자 테스트는 AI가 대체 불가"
    
    ai_prepares:
      - "테스트 시나리오 3개 자동 생성"
      - "결과 입력 양식 제공"
    
    human_executes:
      task: "5명 대상 사용성 테스트 실행"
      instructions_file: "workflows/user-validation-gate.md"
      expected_duration: "3-5일"
      
      result_input_template: |
        테스트 결과를 아래 양식으로 입력하세요:
        ---
        task_completion_rate: ?/15
        core_value_understanding: ?/5
        nps_average: ? (1-10)
        top_pain_points:
          - ""
          - ""
        top_positives:
          - ""
        willingness_to_pay: ?/5
      
      result_file: ".agent-state/outputs/validation-results.md"
    
    timeout: "7일"
    on_timeout: "remind_user"

  # --- CHECKPOINT 4: Ads 집행 (AI 설계, 사람 실행) ---
  ads_operator:
    when: "광고 전략 + 카피 완성 후"
    why: "실제 광고 플랫폼 계정 접근은 사람이 해야 함"
    
    ai_prepares:
      - "캠페인 설정 문서 (타겟팅, 크리에이티브, 비딩)"
      - "플랫폼별 구체적 설정 값"
    
    human_executes:
      task: "Meta/Google/TikTok Ads에서 캠페인 생성 및 실행"
      
      result_input_template: |
        캠페인 라이브 후 입력하세요:
        ---
        platform: ""
        campaign_id: ""
        daily_budget: ""
        start_date: ""
        initial_status: "live|paused|review"
      
      result_file: ".agent-state/outputs/campaign-live.md"
    
    timeout: "none"
    note: "비동기 — content_creator와 병렬이므로 대기하지 않음"

  # --- CHECKPOINT 5: Growth 데이터 입력 ---
  growth_analyst:
    when: "CGO 전략 실행 후 데이터 수집 시점"
    why: "실제 메트릭은 외부 도구에서 가져와야 함"
    
    ai_prepares:
      - "메트릭 수집 양식 제공"
      - "이전 전략 기반 예상 메트릭 범위 제시"
    
    human_provides:
      prompt: |
        현재까지의 핵심 메트릭을 입력하세요:
        ---
        period: "분석 기간 (예: 2025-02-01 ~ 2025-02-14)"
        dau: 
        mau: 
        activation_rate: "%"
        d7_retention: "%"
        d30_retention: "%"  (있으면)
        arpu: "$"
        
        채널별 데이터 (있으면):
        channel_1:
          name: ""
          spend: "$"
          users: 
          cpa: "$"
        
        아직 데이터가 없으면 'no_data' 입력
      
      note: "no_data인 경우 AI가 초기 전략 기반 추정치로 리포트 작성"

  # --- CHECKPOINT 6: CEO Decision 확인 ---
  ceo_decision:
    when: "Growth Insights 완료 후"
    why: "프로젝트 방향 결정은 사람이 해야 함"
    
    ai_prepares:
      - "Go/No-Go 분석 + 추천"
      - "각 옵션의 다음 단계 제시"
    
    human_decides:
      prompt: |
        AI 추천: {recommendation}
        
        선택하세요:
        1. CONTINUE — 현재 전략 유지 + 스케일
        2. ITERATE — 핵심 플로우 개선 (2주 사이클)
        3. PIVOT — 시장 가정 재검증
        4. KILL — 프로젝트 종료
      
      options:
        continue: "Phase 3 재실행 (스케일)"
        iterate: "CGO+CTO 개선 사이클"
        pivot: "Phase 1 재시작"
        kill: "종료 + 포스트모템 작성"
