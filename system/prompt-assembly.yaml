      path: ".agent-state/outputs/architecture.md"
      inject_method: "full_content"
    design_delivery:
      source: "file"
      path: ".agent-state/outputs/design-delivery.md"
      inject_method: "full_content"
      required: false

backend_engineer:
  variables:
    prd_api:
      source: "file"
      path: ".agent-state/outputs/prd.md"
      inject_method: "section"
      section: "api_endpoints"
    prd_db:
      source: "file"
      path: ".agent-state/outputs/prd.md"
      inject_method: "section"
      section: "db_schema"
    architecture:
      source: "file"
      path: ".agent-state/outputs/architecture.md"
      inject_method: "full_content"

code_reviewer:
  variables:
    codebase:
      source: "codebase"
      inject_method: "file_tree_and_key_files"
      note: "OpenClaw가 코드베이스를 자동으로 읽어 주입"

devops:
  variables:
    architecture:
      source: "file"
      path: ".agent-state/outputs/architecture.md"
      inject_method: "section"
      section: "tech_stack"

