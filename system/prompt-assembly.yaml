# ============================================================
# QUALITY GATES (검증 프롬프트)
# ============================================================

gate_1_product_brief:
  variables:
    document:
      source: "file"
      path: ".agent-state/outputs/product-brief.md"
      inject_method: "full_content"
  validation_prompt: |
    Review this Product Brief against these mandatory criteria:
    1. Problem: contains user quotes or data evidence (not just hypothesis)
    2. Target User: specific persona (age, job, behavior pattern)
    3. MVP Features: 1-3, each with "why_essential" explanation
    4. Success Metrics: 2+, each measurable
    
    For each criterion, output: PASS or FAIL with specific reason.
    Overall: PASS only if all 4 mandatory criteria pass.
