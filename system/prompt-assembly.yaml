# Prompt Assembly — 각 프롬프트의 변수(placeholder)와 값 출처
# OpenClaw는 이 파일을 읽어서 프롬프트를 자동 조립한다.

version: "5.1"
schema: "prompt-assembly"

# inject_method:
#   "full_content" — 파일 전체를 삽입
#   "section" — 파일의 특정 섹션만 추출하여 삽입
#   "field" — YAML/JSON의 특정 필드 값만 삽입
#   "user_input" — 사용자에게 직접 입력받음
#   "project_state" — .agent-state/project.json에서 읽음

# ============================================================
# CBO
# ============================================================

pain_point_hunter:
  variables:
    domain:
      source: "user_input"
      prompt: "탐색할 도메인을 입력하세요 (예: '1인 가구 식사', '프리랜서 재무관리')"
      required: true
    existing_hypothesis:
      source: "user_input"
      prompt: "기존 가설이 있으면 입력하세요 (없으면 엔터)"
      required: false
      default: "없음"

competitor_analyst:
  variables:
    top_opportunities:
      source: "file"
      path: ".agent-state/outputs/pain-points.md"
      inject_method: "section"
      section: "top_3_opportunities"
    domain:
      source: "file"
      path: ".agent-state/outputs/pain-points.md"
      inject_method: "field"
      field: "domain"
    existing_solutions:
      source: "file"
      path: ".agent-state/outputs/pain-points.md"
      inject_method: "section"
      section: "findings.existing_solutions"

bm_designer:
  variables:
    positioning:
      source: "file"
      path: ".agent-state/outputs/competitor-analysis.md"
      inject_method: "section"
      section: "positioning_recommendation"
    competitor_pricing:
      source: "file"
      path: ".agent-state/outputs/competitor-analysis.md"
      inject_method: "section"
      section: "direct_competitors.pricing"
    user_wtp:
      source: "file"
      path: ".agent-state/outputs/pain-points.md"
      inject_method: "section"
      section: "findings.willingness_to_pay"

business_planner:
  variables:
    all_outputs:
      source: "file_list"
      paths:
        - ".agent-state/outputs/pain-points.md"
        - ".agent-state/outputs/competitor-analysis.md"
        - ".agent-state/outputs/business-model.md"
      inject_method: "full_content"
      separator: "\n\n---\n\n"

gtm_strategist:
  variables:
    business_plan:
      source: "file"
      path: ".agent-state/outputs/business-plan.md"
      inject_method: "full_content"

# ============================================================
# CTO
# ============================================================

prd_architect:
  variables:
    product_brief:
      source: "file"
      path: ".agent-state/outputs/product-brief.md"
      inject_method: "full_content"
    competitor_features:
      source: "file"
      path: ".agent-state/outputs/competitor-analysis.md"
      inject_method: "section"
      section: "feature_matrix"
      required: false

scope_guard:
  variables:
    prd:
      source: "file"
      path: ".agent-state/outputs/prd.md"
      inject_method: "full_content"
    tier_number:
      source: "project_state"
      field: "project.tier"
    tier_limits:
      source: "static_lookup"
      lookup_table:
        1: { p0_features: 1, apis: 3, screens: 2, dev_hours: 8 }
        2: { p0_features: 3, apis: 5, screens: 4, dev_hours: 80 }
        3: { p0_features: 5, apis: 10, screens: 8, dev_hours: 320 }
        4: { p0_features: 10, apis: 20, screens: 15, dev_hours: 640 }
      key: "project.tier"

architect:
  variables:
    approved_prd:
      source: "file"
      path: ".agent-state/outputs/prd.md"
      inject_method: "full_content"
    scope_review:
      source: "file"
      path: ".agent-state/outputs/scope-review.md"
      inject_method: "section"
      section: "approved_scope"
    budget:
      source: "file"
      path: ".agent-state/outputs/product-brief.md"
      inject_method: "field"
      field: "constraints.budget"
    timeline:
      source: "file"
      path: ".agent-state/outputs/product-brief.md"
      inject_method: "field"
      field: "constraints.timeline"
    tech_preference:
      source: "file"
      path: ".agent-state/outputs/product-brief.md"
      inject_method: "field"
      field: "constraints.tech_preference"
      required: false

frontend_engineer:
